apiVersion: sparkoperator.hpe.com/v1beta2
kind: SparkApplication
metadata:
  name: maintnet-text-etl-aviation
  namespace: project-user-daniel-cao
  labels:
    app.kubernetes.io/part-of: pdm-demo
    pipeline-phase: "2"
    track: text
spec:
  type: Python
  mode: cluster
  image: caovd/pdm-spark-etl:latest
  imagePullPolicy: Always
  mainApplicationFile: local:///opt/pdm/scripts/etl/text_etl_spark.py
  arguments:
    - "--domain"
    - "aviation"
  sparkVersion: "3.5.0"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 2
    onFailureRetryInterval: 30
  # No custom volumes needed — HPE Spark Operator auto-injects:
  #   user-volume   → user-pvc        → /mnt/user
  #   shared-volume → kubeflow-shared-pvc → /mnt/shared
  driver:
    cores: 1
    coreLimit: "2"
    memory: "4g"
    serviceAccount: spark
    labels:
      component: spark-driver
      job: text-etl
    env:
      - name: PDM_STORAGE_ROOT
        value: "/mnt/user/pdm-demo/data"
      - name: PYTHONPATH
        value: "/opt/pdm"
  executor:
    cores: 2
    coreLimit: "2"
    instances: 2
    memory: "4g"
    labels:
      component: spark-executor
      job: text-etl
    env:
      - name: PDM_STORAGE_ROOT
        value: "/mnt/user/pdm-demo/data"
      - name: PYTHONPATH
        value: "/opt/pdm"
