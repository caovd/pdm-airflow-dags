apiVersion: sparkoperator.hpe.com/v1beta2
kind: SparkApplication
metadata:
  name: maintnet-text-etl-aviation
  namespace: pdm-demo
  labels:
    app.kubernetes.io/part-of: pdm-demo
    pipeline-phase: "2"
    track: text
spec:
  type: Python
  mode: cluster
  image: caovd/pdm-spark-etl:latest
  imagePullPolicy: Always
  mainApplicationFile: local:///opt/pdm/scripts/etl/text_etl_spark.py
  arguments:
    - "--domain"
    - "aviation"
  sparkVersion: "3.5.0"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 2
    onFailureRetryInterval: 30
  volumes:
    - name: data-volume
      persistentVolumeClaim:
        claimName: pv-datasets
  driver:
    cores: 1
    coreLimit: "2"
    memory: "4g"
    serviceAccount: spark
    labels:
      component: spark-driver
      job: text-etl
    volumeMounts:
      - name: data-volume
        mountPath: /mnt/data
    env:
      - name: PDM_STORAGE_ROOT
        value: "/mnt/data"
      - name: PYTHONPATH
        value: "/opt/pdm"
  executor:
    cores: 2
    coreLimit: "2"
    instances: 2
    memory: "4g"
    labels:
      component: spark-executor
      job: text-etl
    volumeMounts:
      - name: data-volume
        mountPath: /mnt/data
    env:
      - name: PDM_STORAGE_ROOT
        value: "/opt/pdm"
